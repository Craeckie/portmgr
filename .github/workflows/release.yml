name: release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --extra secrets --group dev

      - name: Run tests
        run: uv run pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject version
        run: |
          version=$(grep -m1 '^version' pyproject.toml | cut -d'"' -f2)
          if [ "v$version" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject version v$version" >&2
            exit 1
          fi

      - name: Build
        run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  pypi:
    needs: [test, build]  # publish only if tests pass and the build succeeds
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/portmgr/
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Purge PyPI CDN cache
        run: |
          # PyPI's JSON API and project page are Fastly-cached; purge so the new
          # version shows up immediately instead of after the cache TTL.
          curl -fsS -X PURGE https://pypi.org/pypi/portmgr/json || true
          curl -fsS -X PURGE https://pypi.org/project/portmgr/ || true

  github-release:
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
